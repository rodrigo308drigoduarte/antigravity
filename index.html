<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfólio Profissional de Fotografia. Armazene e exiba suas fotos com elegância.">
    <title>Safe Picture | Portfólio Fotográfico Profissional</title>
    <!-- Google Fonts: Inter e Outfit para um visual moderno -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <!-- Ícones do Lucide (via CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- CSS Principal -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">
                <img src="logo.png" alt="Safe Picture Logo"
                    style="width: 32px; height: 32px; border-radius: 8px; object-fit: cover; background-color: #000;">
                Safe Picture
            </a>
            <div class="nav-links">
                <button class="btn btn-ghost" id="btn-login" onclick="if(window.app) window.app.showLogin()">Login</button>
                <button class="btn btn-primary" id="btn-signup" onclick="if(window.app) window.app.showLogin()">Começar Agora</button>
            </div>
        </div>
    </nav>

    <!-- App Container onde vamos injetar as telas dinamicamente -->
    <main id="app-content">
        <!-- Conteúdo padrão (Landing Page) -->
        <section class="hero">
            <div class="hero-content">
                <h1>Sua arte, <br><span class="highlight">eternizada e organizada.</span></h1>
                <p>O portfólio em nuvem definitivo para fotógrafos profissionais. Faça upload, crie álbuns elegantes e
                    encante seus clientes.</p>
                <button class="btn btn-primary btn-large" onclick="if(window.app) window.app.showLogin()">Criar meu portfólio</button>
            </div>
            <div class="hero-image-wrapper">
                <img src="hero-image.png" alt="Equipamento Fotográfico Profissional" class="hero-image-main">
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Safe Picture. O portfólio para quem vive da imagem.</p>
    </footer>

    <!-- Script Principal -->
    <script src="app.js"></script>
    <script>
        // Inicializa os ícones do Lucide após o DOM e o app estarem prontos
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>

</html>
